site_name: semvertag
repo_url: https://github.com/<org>/semvertag
docs_dir: docs
edit_uri: edit/main/docs/
nav:
  - Quick Start: index.md
  - Providers:
    - GitHub Actions: providers/github.md
    - GitLab CI: providers/gitlab.md
  - Strategies:
    - Branch prefix: strategies/branch-prefix.md
    - Conventional commits: strategies/conventional-commits.md
  - Contributing:
    - Release runbook: contributing/release.md

theme:
  name: material
  features:
    - content.code.copy
    - content.code.annotate
    - content.action.edit
    - content.action.view
    - navigation.footer
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.instant
    - header.autohide
    - announce.dismiss
  icon:
    edit: material/pencil
    view: material/eye
    repo: fontawesome/brands/git-alt
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: black
      accent: pink
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: pink
      toggle:
        icon: material/brightness-4
        name: Switch to system preference

markdown_extensions:
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - def_list
  - attr_list
  - md_in_html

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/<org>/semvertag
      name: GitHub
