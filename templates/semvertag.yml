spec:
  inputs:
    strategy:
      description: 'Bump strategy. One of: branch-prefix (default), conventional-commits.'
      type: string
      options: [branch-prefix, conventional-commits]
      default: branch-prefix
---
semvertag:
  image: python:3.13-slim@sha256:b04b5d7233d2ad9c379e22ea8927cd1378cd15c60d4ef876c065b25ea8fb3bf3
  resource_group: semvertag
  variables:
    SEMVERTAG_STRATEGY: $[[ inputs.strategy ]]
  before_script:
    - pip install --quiet --no-cache-dir 'uv>=0.4,<1'
  script:
    - uvx 'semvertag>=1,<2'
